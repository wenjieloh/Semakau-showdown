<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Semakau Showdown</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap" id="wrap">

  <div class="hero-row">
    <div class="hero">
      <h1 id="gameTitle">Semakau Showdown</h1>
      <p id="gameSub">Guess which habit sends more plastic to Singapore's last landfill</p>
    </div>
    <div class="top-controls">
      <select id="langSelect" onchange="setLanguage(this.value)">
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="ms">Bahasa Melayu</option>
        <option value="ta">தமிழ்</option>
      </select>
      <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</button>
    </div>
  </div>

  <div class="mascot-bar">
    <div class="mascot-face">🗑️</div>
    <div class="mascot-speech" id="mascotIntro">Eh, welcome lah! I'm Bin Bin. I live at Semakau and I see EVERYTHING you throw away. Let's see who really knows their rubbish!</div>
  </div>

  <div class="island-section">
    <div class="island-label" id="islandLabel">Pulau Semakau health</div>
    <svg id="islandSvg" viewBox="0 0 300 140" class="island-svg">
      <ellipse cx="150" cy="70" rx="130" ry="55" id="islandShape" fill="#2bc492" />
      <ellipse cx="150" cy="70" rx="130" ry="55" fill="none" stroke="#0a2538" stroke-width="3" />
      <text x="150" y="75" id="islandFace" font-size="40" text-anchor="middle">🙂</text>
    </svg>
    <div class="damage-bar-track">
      <div class="damage-bar-fill" id="damageBarFill"></div>
    </div>
    <div class="damage-text" id="damageText">0 of 10 strikes — island is healthy</div>
  </div>

  <div class="scoreboard" id="scoreboard"></div>
  <div class="turn-indicator" id="turn-indicator"></div>
  <div class="board" id="board"></div>
  <div id="win-banner"></div>
  <div id="statsScreen"></div>
</div>

<div class="overlay" id="overlay" style="display:none;">
  <div class="modal" id="modal"></div>
</div>

<div class="overlay" id="bonusOverlay" style="display:none;">
  <div class="modal bonus-modal" id="bonusModal"></div>
</div>

<script src="i18n.js"></script>
<script src="script.js"></script>
</body>
</html>
